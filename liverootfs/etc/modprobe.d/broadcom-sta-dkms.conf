# The broadcom-sta-dkms package requires some modules to be disabled
# in order to use wl. Since the ISO image needs to cover many
# hardware cases, this file overrides the default blacklist.
#
# If you need to use wl, you can uncomment this file, then `rmmod`
# any already-loaded modules that are now blacklisted before
# proceeding to modprobe wl itself.

blacklist b43
blacklist b43legacy
blacklist b44
blacklist bcma
blacklist brcm80211
blacklist brcmsmac
blacklist ssb
